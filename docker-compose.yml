services:
  qdrant:
    build:
      context: .
      dockerfile: Dockerfile.qdrant
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - qdrant_data:/qdrant/storage
    env_file:
      - .env

  backend:
    build: ./backend
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy

  frontend:
    build: ./frontend
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  qdrant_data: